# Hardened forwarding tables
# /etc/nftables-hardened.conf

#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy accept;
    }
 
    chain forward {
        type filter hook forward priority filter; policy drop;

        # Allow established traffic
        ct state established,related accept

        # VLAN 10 to VLAN 20 (Full access)
        iifname "enp0s8.10" oifname "enp0s8.20" accept

        # VLAN 20 to VLAN 10 (Port 80 - Web only)
        iifname "enp0s8.20" oifname "enp0s8.10" tcp dport 80 accept

        # VLAN 10 and 20 Internet access (enp0s3)
        iifname "enp0s8.10" oifname "enp0s3" accept
        iifname "enp0s8.20" oifname "enp0s3" accept

        # Log and Drop cross-VLAN violations
        iifname "enp0s8.20" oifname "enp0s8.10" log prefix "BLOCKED: " drop
    }
 
    chain output {
        type filter hook output priority filter; policy accept;
    }
}

# Allows VLANs to share the Internet connection
table ip nat {
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;
        oifname "enp0s3" masquerade
    }
}
